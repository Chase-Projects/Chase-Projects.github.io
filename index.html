<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chase Varga - Personal Homepage</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 60px 40px;
            max-width: 600px;
            text-align: center;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: #667eea;
        }

        .subtitle {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 30px;
        }

        p {
            margin-bottom: 20px;
            color: #555;
        }

        .links {
            margin-top: 40px;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .links a {
            text-decoration: none;
            color: white;
            background: #667eea;
            padding: 12px 24px;
            border-radius: 5px;
            transition: background 0.3s ease;
            font-weight: 500;
        }

        .links a:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Chase Varga</h1>
        <p class="subtitle">Welcome to my personal homepage</p>

        <p>This is my personal site hosted on GitHub Pages.</p>
        <p>Feel free to customize this page however you'd like!</p>

        <div class="links">
            <a href="https://chase-projects.github.io/nutrisave-solutions/" target="_blank">NutriSave</a>
            <a href="https://github.com/Chase-Projects" target="_blank">GitHub</a>
            <a href="#" target="_blank">LinkedIn</a>
            <a href="#" target="_blank">Contact</a>
        </div>
    </div>
</body>
</html>
